services:
  backend:
    build: backend
    ports:
      - '3000:3000'

  frontend:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro

  llm_service:
    build: llm_service
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  ollama:
    build: ollama
    mem_limit: 12g
    mem_reservation: 6g
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=0
    restart: unless-stopped

volumes:
  ollama_models: